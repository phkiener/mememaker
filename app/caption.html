<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mememaker</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/css/root.css" />
    <link rel="preload" as="json" href="/data/templates.json" />
</head>

<body>
<header>
    <h1>Mememaker</h1>
</header>

<main id="caption-container">
    <h2>#</h2>

    <svg>
        <style>
            text {
                font-family: Impact, sans-serif;
                text-transform: uppercase;

                fill: white;
                stroke: black;
                stroke-width: 2px;

                font-size: 36px;

                user-select: none;
            }

            svg:hover text {
                outline: 2px solid black;
                outline-offset: 1px;

                cursor: move;
            }
        </style>

    </svg>
    <section>
        <div class="captions"></div>
        <div>
            <button type="button" command="show-modal" commandfor="export-dialog">Export</button>
        </div>
    </section>
</main>

<dialog id="export-dialog">
    <canvas width="100%" height="100%"></canvas>
</dialog>

<footer>

</footer>

<script src="/js/app.js" type="module"></script>
</body>
</html>
